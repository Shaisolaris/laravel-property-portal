version: '3.7'
services:
    nginx:
        image: nginx:1.21.6-alpine
        container_name: ${APP_NAME}-nginx
        working_dir: /var/www/html
        volumes:
            - ./:/var/www/html:delegated
            - ./docker/development/nginx/default.conf:/etc/nginx/conf.d/default.conf
            - ./docker/development/nginx/nginx.conf:/etc/nginx/nginx.conf
        links:
            - app
        depends_on:
            - app
            - database
        ports:
            - '80:80'
        networks:
            - inoura

    app:
        container_name: ${APP_NAME}-php
        build:
            args:
                user: ${APP_NAME}
                uid: 1000
            context: docker/development/php
            dockerfile: php.docker
        environment:
            APP_NAME: ${APP_NAME}
        volumes:
            - ./docker/development/php/php.ini:/usr/local/etc/php/conf.d/php.ini
            - ./:/var/www/html
        working_dir: /var/www/html
        ports:
            - '9001:9001'
            - '${LARAVEL_WEBSOCKETS_PORT}:6001'
        links:
            - database
        depends_on:
            - database
        networks:
            - inoura

    redis:
        image: redis:6.2.6-alpine
        container_name: ${APP_NAME}-redis
        restart: unless-stopped
        ports:
            - '6379:6379'
        networks:
            - inoura

    database:
        image: postgres:14.1-alpine
        container_name: ${APP_NAME}-database
        restart: unless-stopped
        environment:
            - POSTGRES_DB=${DB_DATABASE}
            - POSTGRES_USER=${DB_USERNAME}
            - POSTGRES_PASSWORD=${DB_PASSWORD}
        volumes:
            - ./docker/postgres/data:/var/lib/postgresql/data/:rw
        ports:
            - '5432:5432'
        networks:
            - inoura

volumes:
    database:
        driver: local
networks:
    inoura:
        driver: bridge
